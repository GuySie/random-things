#              - light.turn_off: buzzer

sensor:
# Temperature and Relative Humidity sensor configuration
# Uncomment to provide temperature and humidity readings
#  - platform: sht4x
#    temperature:
#      name: "Temperature"
#      id: temp_sensor
#    humidity:
#      name: "Relative Humidity"
#      id: hum_sensor
# Battery voltage and Battery level sensor configuration
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    internal: true
    update_interval: 20s
    attenuation: 12db
    filters:
# Compensate for voltage divider
      - multiply: 2.0 
  - platform: template
    name: "Battery Level"
    id: battery_level
    entity_category: diagnostic
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: 10s
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100

output:
# Green side LED GPIO configuration
  - platform: gpio
    pin: GPIO6
    id: led_output
    inverted: true
# Battery voltage measurement GPIO configuration
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable
# Buzzer configuration (to control the buzzer pwm, pretend it's an LED light)
  - platform: ledc
    pin: GPIO45
    id: buzzer_pwm
# The frequency determines the pitch of the buzzer's sound
    frequency: 100Hz

light:
# Expose green side LED to Home Assistant
  - platform: binary
    name: "Onboard LED"
    output: led_output
    id: onboard_led
    icon: mdi:led-outline
    disabled_by_default: true
# Create a fake light entity to control the buzzer. The 'brightness' of the light controls the buzzer's volume
  - platform: monochromatic
    output: buzzer_pwm
    name: "Buzzer"
    id: buzzer
    icon: mdi:volume-high
    disabled_by_default: true
    default_transition_length: 0s


## E-ink display configuration (spi, display, lvgl)
spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: epaper_spi
    id: epaper_display
    model: Seeed-reTerminal-E1002
    update_interval: never
    auto_clear_enabled: false

lvgl:
  buffer_size: 12%
  pages:
    - id: main_page
      widgets:
        - image:
            align: CENTER
            id: art
            src: onlineimage


## Image variables configuration
number:
# Total number of images in the folder; must match highest number filename in the folder
  - platform: template
    name: "Total Images"
    id: total_images
    icon: mdi:camera-burst
    min_value: 1
    max_value: ${max_images}
    step: 1
    restore_value: true
    initial_value: 10
    optimistic: true
    mode: box
# Current image being displayed
  - platform: template
    name: "Current Image"
    id: image_counter
    icon: mdi:image-frame
    min_value: 1
    max_value: ${max_images}
    step: 1
    restore_value: true
    initial_value: 1
    optimistic: true
    mode: box
    on_value:
      then:
# If current image is set to a file that can not exist, instead set to the highest-numbered file that can exist
        - if:
            condition:
              lambda: 'return id(image_counter).state > id(total_images).state;'
            then:
              - number.set:
                  id: image_counter
                  value: !lambda 'return id(total_images).state;'
            else:
# URL of image to display is always updated here, this causes online_image to start downloading
              - online_image.set_url:
                  id: onlineimage
                  url: !lambda |-
                    char urlstring[254];
                    sprintf(urlstring, "${ha_www_url}${album_folder}%d%s", (int)id(image_counter).state, ".png");
                    return (urlstring);


## Online image configuration
online_image:
  - url: https://placehold.co/10x10/white/white/jpg
    id: onlineimage
    type: rgb565
    format: png
    resize: 800x480
# Display component is always updated here once online_image has finished downloading
    on_download_finished:
      - lvgl.image.update:
          id: art
          src: onlineimage
      - component.update: epaper_display


## Switch configuration
switch:
# Expose switch to let user turn on/off button feedback sounds
  - platform: template
    name: "Audio Feedback"
    id: audiofeedback
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    lambda: return id(audiofeedback).state;
# Deep sleep behavior linked to input boolean in Home Assistant
  - platform: homeassistant
    id: allow_deepsleep 
    name: "HA Deep sleep"
    entity_id: ${ha_deep_sleep}
    on_turn_on:
      - deep_sleep.allow: deep_sleep_1
      - switch.turn_on: allow_deepsleep_toggle
    on_turn_off:
      - deep_sleep.prevent: deep_sleep_1
      - switch.turn_off: allow_deepsleep_toggle
# Expose switch to let user toggle the deep sleep input boolean from the device
# For this to work, the option "Allow the device to perform Home Assistant actions" must have been enabled
  - platform: template
    name: "Deep Sleep Toggle"
    id: allow_deepsleep_toggle
    optimistic: true
    entity_category: config
    on_turn_on:
      - homeassistant.action:
          action: input_boolean.turn_on
          data:
            entity_id: ${ha_deep_sleep}
    on_turn_off:
      - homeassistant.action:
          action: input_boolean.turn_off
          data:
            entity_id: ${ha_deep_sleep}
    lambda: return id(allow_deepsleep_toggle).state;
# Restart
  - platform: restart
    name: "Device Restart"

button:
  - platform: template
    name: "Random Image"
    id: random_image
    icon: "mdi:slot-machine"
    on_press:
      then:
        - number.set:
            id: image_counter
            value: !lambda |-
              uint32_t random_value = esp_random();
              return (random_value % (int)id(total_images).state);
        - if:
            condition:
              lambda: 'return (id(audiofeedback).state);'
            then:
              - light.turn_on:
                  id: buzzer
                  brightness: 25%
              - delay: 150ms
              - light.turn_off: buzzer
  - platform: template
    name: "Previous Image"
    id: previous_image
    icon: "mdi:skip-previous"
    on_press:
      then:
# If currently displayed image is the first one in the folder, don't go further back
        - if:
            condition:
              lambda: 'return id(image_counter).state == 1;'
            then:
              - logger.log: "Image counter already at minimum image count"
            else:
              - number.decrement:
                  id: image_counter
                  cycle: false
        - if:
            condition:
              lambda: 'return (id(audiofeedback).state);'
            then:
              - light.turn_on:
                  id: buzzer
                  brightness: 25%
              - delay: 150ms
              - light.turn_off: buzzer
  - platform: template
    name: "Next Image"
    id: next_image
    icon: "mdi:skip-next"
    on_press:
      then:
# If currently displayed image is the last one in the folder, don't go further forward
        - if:
            condition:
              lambda: 'return id(image_counter).state == id(total_images).state;'
            then:
              - logger.log: "Image counter already at total image count"
            else:
              - number.increment:
                  id: image_counter
                  cycle: false
        - if:
            condition:
              lambda: 'return (id(audiofeedback).state);'
            then:
              - light.turn_on:
                  id: buzzer
                  brightness: 25%
              - delay: 150ms
              - light.turn_off: buzzer
