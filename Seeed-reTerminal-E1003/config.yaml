####################################################
## Seeed reTerminal E1003 Art Display
##
## Configuration to use a Seeed reTerminal E1003 e-ink display as a digital art frame.
## The display wakes on a configurable schedule to show a random image. By default, recently
## shown images are tracked so the same image won't repeat until roughly half the collection
## has cycled through. This can be toggled off from Home Assistant for pure random selection.
##
## HOW TO USE
##
## PREPARATION
## 01. Set substitutions for names, keys, passwords, etc.
## 02. Set substitution ha_www_url to the publicly accessible URL of your www folder, with trailing slash. This default should work for most people.
##     For more information, check: https://www.home-assistant.io/integrations/http/#hosting-files
## 03. Set substitution album_folder to the initial subfolder name (no trailing slash needed, or "" for none). Changeable at runtime via the "Album Folder" text entity in Home Assistant.
## 04. Set substitution max_images to the maximum amount of images you want to use in the future without having to update this configuration again.
## 05. Set substitution rotation to 0 if you want to use the device in landscape mode, or 270 if you want to use it in portrait mode.
## 06. Create a helper boolean in Home Assistant that will control whether this frame goes into deep sleep. Set substitution ha_deep_sleep to this helper's entity name.
## 07. Optionally adjust substitution deep_sleep_run — the maximum time the device stays awake per cycle. The default of 90 seconds is enough to download and display an image.
## 08. Upload properly prepared PNG images to the (sub)folder you configured. Number them sequentially, starting at 1.png, followed by 2.png, etc.
##     This configuration assumes a continuous set of sequentially ascending numbered files, with no gaps.
##
## INSTALLATION
## 09. Set your deep sleep helper boolean to off, so you can configure the display after installation.
## 10. Keep image_history.h in the same folder as config.yaml — it is required for compilation.
## 11. Install this configuration onto your Seeed reTerminal E1003 display.
## 12. Add the display to Home Assistant after it has been discovered.
## 13. In the display's ESPHome settings, turn on the option "Allow the device to perform Home Assistant actions."
## 14. In Home Assistant, set the "Total Images" number of this ESPHome device to the highest numbered image you have uploaded.
##     Update this number if you upload additional (sequentially-numbered) images.
## 15. In the display's ESPHome settings, configure the following (no reflashing needed):
##     - "Refresh Interval" — how often (in whole hours) to wake, aligned to clock boundaries (e.g. 1 = every hour at :00, 6 = at 00:00/06:00/12:00/18:00)
##     - "Active Hours Start" / "Active Hours End" — window during which refreshes are allowed; wakeups outside this window are skipped to the next boundary inside it.
##       Set start 0 and end to 23 to run continuously around the clock.
##     - "Album Folder" — subfolder within /local/ where images are stored; no trailing slash needed, leave empty if images are in /local/ directly.
##
## USAGE
## 16. Set your deep sleep helper boolean to on, so the display will automatically go through deep sleep cycles. Every time it wakes, it will load a random image.
## 17. For ease of use, the deep sleep helper boolean is also exposed in the display's ESPHome settings.
## 18. Press the green button to wake the display out of deep sleep (and load a random image).
## 19. While the display is awake, you can do the following:
## 20. Press the white buttons on top of the display to go forward/backward sequentially through your images.
## 21. Use the buttons in the display's ESPHome settings to go to the next, previous, or a random image.
## 22. Set the "Current Image" number of this device in Home Assistant to go to that specific numbered image.
## 23. Turn on the Audio Feedback toggle in the display's ESPHome settings to get buzzer sounds when performing actions.
## 24. Toggle the Image History switch in the display's ESPHome settings to switch between history-aware random selection
##     (default, avoids recently shown images) and pure random selection (any image can appear at any time).
##
## To prepare images for use on this display, ensure they are:
## - In PNG format
## - In 1404x1872 pixel resolution for portrait mode (rotation: 270), or 1872x1404 for landscape (rotation: 0)
## - In 16-level grayscale (the IT8951 controller in this display renders 4bpp grayscale)
##
## By Guy Sie (https://github.com/guysie)
##
####################################################

substitutions:
  name: seeed-grayscale
  friendly_name: "Seeed reTerminal E1003"
  project_name: "Guy Sie.reTerminal E1003 Art Display"
  project_version: "0.6.0"
  api_key: ""
  ota_password: ""
  ap_password: ""
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ha_www_url: "http://homeassistant.local:8123/local/"
  album_folder: "reterminal"
  max_images: 1000
  rotation: 0
  ha_deep_sleep: "input_boolean.reterminal_deep_sleep"
  deep_sleep_run: "90s"

####################################################

esphome:
  min_version: 2025.11.0
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: ${project_name}
    version: ${project_version}
  includes:
    - image_history.h
  on_boot:
# Enable battery voltage measurement
    - priority: 600
      then:
        - output.turn_on: bsp_battery_enable
  on_shutdown:
# Disable battery voltage divider before deep sleep
    - priority: 200
      then:
        - output.turn_off: bsp_battery_enable
# Compute clock-aligned sleep duration from RTC just before entering deep sleep
    - priority: 100
      then:
        - lambda: |-
            int interval_h   = (int)id(rtc_interval_hours).state;
            int active_start = (int)id(rtc_hour_start).state;
            int active_end   = (int)id(rtc_hour_end).state;

            auto t = id(rtc_time).now();
            if (!t.is_valid()) {
              id(deep_sleep_1).set_sleep_duration((uint32_t)interval_h * 3600000UL);
              ESP_LOGW("rtc_sleep", "RTC not set, sleeping %d h", interval_h);
              return;
            }

            int now_secs      = t.hour * 3600 + t.minute * 60 + t.second;
            int interval_secs = interval_h * 3600;

            // Next clock-aligned boundary (always at least 1 full interval from now)
            int next_secs = ((now_secs / interval_secs) + 1) * interval_secs;

            // Advance past quiet hours (cap at 48 iterations)
            for (int i = 0; i < 48; i++) {
              int h = (next_secs / 3600) % 24;
              if (h >= active_start && h <= active_end) break;
              next_secs += interval_secs;
            }

            uint32_t sleep_ms = (uint32_t)(next_secs - now_secs) * 1000UL;
            id(deep_sleep_1).set_sleep_duration(sleep_ms);
            ESP_LOGI("rtc_sleep", "Next wake in %u s at hour %d",
                     (next_secs - now_secs), (next_secs / 3600) % 24);

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  fast_connect: true
# Device waits for successful wifi connection (specifically, after initial boot and after waking from deep sleep) to update to a new random image
# Side effect: will also trigger on wifi reconnection if device has poor reception
  on_connect:
    - component.update: sht40_sensor
    - component.update: battery_voltage
    - button.press: random_image
# Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Seeed-Reterminal"
    password: ${ap_password}

captive_portal:

http_request:
  buffer_size_rx: 32768

## Deep sleep configuration
# Comment out to disable deep sleep. This lets you use the green button as a control instead
deep_sleep:
  id: deep_sleep_1
  run_duration: ${deep_sleep_run}
# sleep_duration is computed dynamically from RTC just before sleep (see on_shutdown lambda above)
# Green button interrupts deep sleep
  wakeup_pin: GPIO3
  wakeup_pin_mode: INVERT_WAKEUP


## Hardware configuration (ESP, buttons, sensors, buzzer, LED)
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

psram:
  mode: octal

external_components:
  - source:
      type: local
      path: components
    components: [it8951_reterminal_e1003]

i2c:
  id: i2c0
  sda: GPIO19
  scl: GPIO20

time:
  - platform: pcf8563
    id: rtc_time
    address: 0x51
    i2c_id: i2c0
    update_interval: never

  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - pcf8563.write_time:
            id: rtc_time

binary_sensor:
# Left white button (back)
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    id: button_1
    name: "Button Left"
    disabled_by_default: true
    on_press:
      then:
# If currently displayed image is the first one in the folder, don't go further back
        - if:
            condition:
              lambda: 'return id(image_counter).state == 1;'
            then:
              - logger.log: "Image counter already at minimum image count"
            else:
              - number.decrement:
                  id: image_counter
                  cycle: false
        - if:
            condition:
              lambda: 'return (id(audiofeedback).state);'
            then:
              - light.turn_on:
                  id: buzzer
                  brightness: 25%
              - delay: 20ms
              - light.turn_off: buzzer

# Right white button (forward)
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    id: button_2
    name: "Button Right"
    disabled_by_default: true
    on_press:
      then:
# If currently displayed image is the last one in the folder, don't go further forward
        - if:
            condition:
              lambda: 'return id(image_counter).state == id(total_images).state;'
            then:
              - logger.log: "Image counter already at total image count"
            else:
              - number.increment:
                  id: image_counter
                  cycle: false
        - if:
            condition:
              lambda: 'return (id(audiofeedback).state);'
            then:
              - light.turn_on:
                  id: buzzer
                  brightness: 25%
              - delay: 20ms
              - light.turn_off: buzzer

## Green button (random)
# Uncomment to use green button for random image. You must disable deep sleep to do so.
#  - platform: gpio
#    pin:
#      number: GPIO3
#      mode: INPUT_PULLUP
#      inverted: true
#    id: button_3
#    name: "Button Green"
#    disabled_by_default: true
#    on_press:
#      then:
